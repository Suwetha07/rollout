apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app
  namespace: argocd   
spec:
  project: default
  source:
    repoURL: https://github.com/suwetha07/rollout.git
    targetRevision: HEAD
    path: .  
  destination:
    server: https://kubernetes.default.svc
    namespace: frontui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
